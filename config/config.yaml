carla:
  fixed_delta_seconds: 0.05
  host: localhost
  map: Town03
  port: 2000
  synchronous_mode: true
  timeout: 10.0
  weather: ClearNoon
control:
  emergency_brake_distance: 3.0
  max_steering_angle: 70.0
  pid:
    steering: {kd: 0.05, ki: 0.0, kp: 0.8}
    throttle: {kd: 0.01, ki: 0.1, kp: 0.5}
cooperation:
  communication:
    dropout_rate: 0.0
    max_latency_ms: 100
    protocol: socket # Standard for direct RPi-PC V2V
  enabled: true
  message_frequency: 10
  coordination_range: 50.0
  active_coordination_range: 30.0
  warning_range: 15.0
  num_cooperative_vehicles: 2
  num_npc_vehicles: 8        # NPC traffic vehicles spawned near route
  num_npc_pedestrians: 5     # Pedestrians spawned near route sidewalks
depth:
  max_distance: 100.0
  source: carla_depth_camera
logging:
  level: INFO
  output_dir: output/
  save_metrics: true
  save_video: false
perception:
  use_onnx: false            # Disabled: ONNX IR version mismatch on Python 3.7
  use_openvino: false        # Set to true if openvino model is present
  imgsz: 640                 # PC demo — prioritize detection quality over FPS
  confidence_threshold: 0.3  # Lower threshold to catch more obstacles
  onnx_model_path: model/yolo11n.onnx
  pt_model_path: model/yolov8n.pt  # YOLOv8 works with ultralytics 8.0.x on Python 3.7
  openvino_model_path: model/yolo11n_openvino
  vehicle_classes: [2, 3, 5, 7]
  pedestrian_classes: [0]
  cyclist_classes: [1]
  traffic_sign_classes: [9, 11, 12]
planning:
  apf:
    # Tuned for smooth steering — reduced repulsion to prevent overreaction
    k_attractive: 2.0
    k_repulsive: 80.0          # Was 180 — too aggressive, caused sharp turns
    k_rotational: 20.0         # Was 40 — proportional reduction
    d0: 15.0
    emergency_distance: 3.0
    goal_tolerance: 5.0
    max_speed: 15.0        # Safe speed for indoor demo
    min_speed: 5.0
  path_smoothing:
    smoothing_factor: 0.3
raspberry_pi:
  # Hardware Pins - Synced with rpi_deploy/hardware_config.py
  ultrasonic:
    trigger_pin: 20
    echo_pin: 21
    emergency_distance: 0.25 # 25cm
  motor_control:
    base_pwm: 0.30          # Overcome static friction
    max_speed_pwm: 0.80
    left_pins: [22, 27, 18] # forward, backward, enable
    right_pins: [25, 24, 23]
  servo_control:
    pca9685_address: 0x40
    ultrasonic_channel: 0
    camera_pan_channel: 1
    camera_tilt_channel: 2
sensors:
  rgb_camera:
    fov: 110
    image_size_x: 1280
    image_size_y: 720
  depth_camera:
    fov: 110
    image_size_x: 1280
    image_size_y: 720
